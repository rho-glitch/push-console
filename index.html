<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직방 푸시 콘솔</title>
<style>
:root {
  --tp: #1a1a1a; --ts: #6b7280; --tt: #9ca3af;
  --bp: #ffffff; --bs: #f7f7f8;
  --b1: #d1d5db; --b2: #e5e7eb; --b3: #efefef;
  --rm: 8px; --rl: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:#fff;color:var(--tp);font-size:14px;min-height:100vh}
.page-wrap{max-width:760px;margin:0 auto;padding:20px 20px 40px}

/* 헤더 */
.page-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid var(--b3)}
.page-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.page-badge{font-size:11px;background:#EAF3DE;color:#3B6D11;
  border-radius:20px;padding:2px 9px;font-weight:500}

/* 서비스 탭 */
.svc-tabs{display:flex;gap:4px;background:var(--bs);border-radius:var(--rm);
  padding:3px;margin-bottom:14px;border:1px solid var(--b3)}
.svc-tab{flex:1;padding:8px 6px;border:none;background:transparent;border-radius:7px;
  font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;
  color:var(--ts);transition:all .15s;display:flex;align-items:center;
  justify-content:center;gap:6px}
.svc-tab-logo{height:22px;width:auto;object-fit:contain;vertical-align:middle}
.tab-zb-on{background:#fff;color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab-hg-on{background:#fff;color:#3B6D11;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* NL 입력 */
.nl-wrap{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.nl-input{flex:1;border:0.5px solid var(--b2);border-radius:var(--rm);
  padding:9px 12px;font-size:13px;font-family:inherit;background:#fff;
  color:var(--tp);outline:none;resize:none;line-height:1.5;
  min-height:38px;max-height:80px}
.nl-input:focus{border-color:#378ADD;box-shadow:0 0 0 2px #E6F1FB}
.nl-input::placeholder{color:var(--tt)}
.nl-btn{border:0.5px solid #378ADD;background:#E6F1FB;color:#185FA5;
  border-radius:var(--rm);padding:9px 14px;font-size:13px;font-weight:500;
  font-family:inherit;cursor:pointer;white-space:nowrap;display:flex;
  align-items:center;gap:5px;flex-shrink:0;transition:all .12s}
.nl-btn:hover{background:#B5D4F4}
.nl-btn:disabled{opacity:.45;cursor:not-allowed}
.nl-status{font-size:12px;color:var(--tt);margin-bottom:10px;min-height:18px}
.nl-status.err{color:#A32D2D;background:#FCEBEB;border:0.5px solid #F7C1C1;
  border-radius:var(--rm);padding:6px 10px}

/* 세그먼트 */
.sec-lbl{font-size:10px;font-weight:500;color:var(--tt);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:8px}
.segs-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.seg{background:#fff;border:0.5px solid var(--b2);border-radius:var(--rm);
  padding:7px 11px;cursor:pointer;display:flex;align-items:flex-start;gap:7px;
  text-align:left;font-family:inherit;transition:all .12s}
.seg:hover{border-color:var(--b1);background:var(--bs)}
.seg-ico{font-size:16px;line-height:1;margin-top:1px}
.seg-nm{font-size:12px;font-weight:500;line-height:1.3}
.seg-ds{font-size:11px;color:var(--tt);margin-top:2px;line-height:1.3}
.seg.a-amber .seg-nm{color:#633806}
.seg.a-blue  .seg-nm{color:#0C447C}
.seg.a-green .seg-nm{color:#27500A}

/* 구분선 */
.divider{display:flex;align-items:center;gap:10px;margin:12px 0 10px}
.dline{flex:1;border-top:0.5px solid var(--b3)}
.dtxt{font-size:11px;color:var(--tt);white-space:nowrap}

/* 필터 그리드 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.card{background:var(--bs);border:0.5px solid var(--b3);
  border-radius:var(--rl);padding:11px 13px}
.clabel{font-size:10px;font-weight:500;color:var(--tt);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:7px;display:block}
.clabel+.clabel{margin-top:9px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{background:#fff;border:0.5px solid var(--b2);color:var(--ts);
  border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;
  user-select:none;-webkit-user-select:none;transition:all .1s}
.tag:hover{border-color:var(--b1)}
.tag.on-blue  {background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.tag.on-green {background:#EAF3DE;border-color:#3B6D11;color:#27500A}
.tag.on-amber {background:#FAEEDA;border-color:#BA7517;color:#633806}

/* 칩 바 */
.chips-bar{min-height:30px;background:var(--bs);border:0.5px solid var(--b3);
  border-radius:var(--rm);padding:5px 10px;display:flex;flex-wrap:wrap;
  gap:5px;align-items:center;margin-bottom:10px}
.chip{background:#fff;border:0.5px solid var(--b2);border-radius:4px;
  padding:2px 7px;font-size:11px;color:var(--ts)}
.empty-msg{font-size:11px;color:var(--tt)}

/* 액션바 */
.bot{display:flex;align-items:center;gap:8px}
.cnt-lbl{font-size:11px;color:var(--tt);flex-shrink:0;min-width:48px}
.csv-tog{display:flex;align-items:center;gap:5px;padding:8px 11px;
  border:0.5px solid var(--b2);border-radius:var(--rm);cursor:pointer;
  background:var(--bs);flex-shrink:0;user-select:none;transition:all .12s}
.csv-tog.on{background:#EAF3DE;border-color:#3B6D11}
.cb{width:13px;height:13px;border-radius:3px;border:0.5px solid var(--b1);
  background:#fff;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:9px;font-weight:500;color:transparent;transition:all .12s}
.csv-tog.on .cb{background:#3B6D11;border-color:#3B6D11;color:#fff}
.cb-l{font-size:12px;color:var(--ts)}
.csv-tog.on .cb-l{color:#27500A}
.btn-rst{background:var(--bs);border:0.5px solid var(--b2);color:var(--ts);
  border-radius:var(--rm);padding:8px 13px;font-size:12px;font-family:inherit;
  cursor:pointer;flex-shrink:0;transition:all .12s}
.btn-rst:hover{border-color:var(--b1);color:var(--tp)}
.btn-q{flex:1;border:none;color:#fff;border-radius:var(--rm);padding:9px 16px;
  font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn-q.zb{background:#185FA5}.btn-q.zb:hover{background:#0C447C}
.btn-q.hg{background:#3B6D11}.btn-q.hg:hover{background:#27500A}
.btn-q:disabled{opacity:.45;cursor:not-allowed}

/* 결과 박스 */
.result-box{margin-top:12px;border:0.5px solid var(--b2);
  border-radius:var(--rm);overflow:hidden}
.result-hd{background:var(--bs);border-bottom:0.5px solid var(--b2);
  padding:9px 13px;display:flex;align-items:center;justify-content:space-between}
.result-hd-title{font-size:12px;font-weight:500;color:var(--ts);
  display:flex;align-items:center;gap:6px}
.copy-btn{background:#fff;border:0.5px solid var(--b2);color:var(--ts);
  border-radius:5px;padding:3px 10px;font-size:11px;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .1s}
.copy-btn:hover{border-color:#378ADD;color:#185FA5}
.copy-btn.ok{background:#EAF3DE;border-color:#3B6D11;color:#3B6D11}
.query-ta{width:100%;border:none;outline:none;resize:none;padding:10px 13px;
  font-size:11px;font-family:'SF Mono','Fira Code',monospace;background:#fff;
  color:var(--ts);line-height:1.7;min-height:64px;
  border-bottom:0.5px solid var(--b3)}
.result-foot{padding:8px 13px;font-size:11px;color:var(--tt);
  display:flex;align-items:center;gap:6px;background:var(--bs)}
.result-foot a{color:#185FA5;text-decoration:none}
.result-foot a:hover{text-decoration:underline}

/* 결과 패널 */
/* ── 결과 패널 ── */
.result-panel{margin-top:12px;display:flex;flex-direction:column;gap:9px}

/* 상단: 대상자 수 히어로 카드 */
.res-hero{border-radius:var(--rl);padding:22px 20px 16px;text-align:center}
.res-hero.done{background:linear-gradient(160deg,#EBF5DF 0%,#E0F0D0 100%);border:0.5px solid #3B6D11}
.res-hero.loading{background:var(--bs);border:0.5px solid var(--b3)}
.res-hero.fallback{background:var(--bs);border:0.5px solid var(--b3)}
.res-hero.error{background:#FCEBEB;border:0.5px solid #F7C1C1}
.res-num-wrap{display:flex;align-items:baseline;justify-content:center;gap:3px;margin-bottom:5px;line-height:1}
.res-big-num{font-size:48px;font-weight:700;color:#27500A;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.res-big-num.anim{color:#C5D9B0;animation:resPulse 1.3s ease-in-out infinite}
@keyframes resPulse{0%,100%{opacity:1}50%{opacity:.35}}
.res-big-unit{font-size:22px;font-weight:600;color:#3B6D11}
.res-big-label{font-size:12px;font-weight:500;color:#3B6D11;margin-bottom:7px}
.res-big-cond{font-size:11px;color:#639922;font-family:'SF Mono','Fira Code',monospace;line-height:1.6;word-break:break-all}
.res-big-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-top:13px;padding-top:11px;border-top:0.5px solid rgba(59,109,17,.15)}
.res-time-lbl{font-size:10px;color:#639922}
.res-csv-badge{font-size:11px;background:#fff;border:0.5px solid #639922;border-radius:4px;padding:2px 7px;color:#3B6D11}
.res-copy-num{background:#fff;border:0.5px solid #3B6D11;color:#3B6D11;border-radius:5px;padding:4px 12px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .1s;margin-left:auto}
.res-copy-num:hover{background:#EAF3DE}

/* 하단: Cube.js 쿼리 */
.res-query-box{background:#fff;border:0.5px solid var(--b2);border-radius:var(--rm);overflow:hidden}
.res-query-hd{background:var(--bs);border-bottom:0.5px solid var(--b2);padding:8px 13px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:500;color:var(--ts)}
.res-query-code{margin:0;padding:10px 13px;font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:var(--ts);line-height:1.7;white-space:pre;overflow-x:auto;background:#fff}
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <div class="page-title">📤 직방 푸시 콘솔</div>
    <span class="page-badge">zb · hg</span>
  </div>

  <div id="root"></div>
</div>

<script>
/* ── 이모지 맵 (Tabler 아이콘 대체) ── */
const EMOJI = {
  'ti ti-home':         '🏠',
  'ti ti-search':       '🔍',
  'ti ti-arrow-right':  '▶',
  'ti ti-flame':        '🔥',
  'ti ti-bell':         '🔔',
  'ti ti-refresh':      '🔄',
  'ti ti-leaf':         '🌱',
  'ti ti-bolt':         '⚡',
  'ti ti-building':     '🏢',
  'ti ti-map-pin':      '📍',
  'ti ti-check':        '✅',
  'ti ti-message':      '💬',
  'ti ti-trending-up':  '📈',
  'ti ti-send':         '📤',
  'ti ti-clipboard-copy':'📋',
  'ti ti-copy':         '📋',
};

const DEFS={
  zb:{cube:'zb_user_profile_all',groups:{
    region:     {color:'blue', label:'거주지역',    opts:['서울특별시','경기도','인천광역시','부산광역시','대구광역시','대전광역시','광주광역시','울산광역시','세종특별자치시','강원도','충청북도','충청남도','전라북도','전라남도','경상북도','경상남도','제주특별자치도']},
    gender:     {color:'blue', label:'성별',        opts:['남자','여자']},
    age:        {color:'blue', label:'나이대',      opts:['10대','20대','30대','40대','50대+']},
    lifecycle:  {color:'green',label:'라이프사이클',opts:['active','inactive','frozen','nru']},
    crm:        {color:'amber',label:'CRM 등급',    opts:[{l:'100 방문',v:'100'},{l:'200 매물조회',v:'200'},{l:'300 찜/알림',v:'300'},{l:'400 1회문의',v:'400'},{l:'500 코어',v:'500'}]},
    property:   {color:'blue', label:'매물유형',    opts:['아파트','원오빌','아파트+원오빌']},
    transaction:{color:'blue', label:'거래유형',    opts:['매매','전세','월세']},
    urgency:    {color:'amber',label:'긴박도',      opts:['즉시','1~3개월','탐색 중','관망','장기']},
    push:       {color:'green',label:'푸시수신',    opts:['허용','거부']}
  }},
  hg:{cube:'hogangnono_user',groups:{
    sex:    {color:'blue', label:'성별',      opts:[{l:'남성',v:'male'},{l:'여성',v:'female'}]},
    ad:     {color:'green',label:'마케팅동의',opts:[{l:'동의',v:'1'},{l:'미동의',v:'0'}]},
    login:  {color:'blue', label:'로그인유형',opts:['kakao','apple','mobile','email']},
    subtype:{color:'blue', label:'회원유형',  opts:[{l:'일반',v:'0'},{l:'중개업소',v:'1'}]},
    mobile: {color:'green',label:'모바일인증',opts:[{l:'인증완료',v:'1'},{l:'미인증',v:'0'}]},
    recency:{color:'amber',label:'최근접속',  opts:['7일 이내','30일 이내','90일 이내','180일 이내']}
  }}
};

const SEGS={
  zb:[
    {nm:'전환 임박',   ico:'🔥', ac:'amber', ds:'Active · CRM 400·500 · 푸시허용',       f:{lifecycle:['active'],crm:['400','500'],push:['허용']}},
    {nm:'넛지 최적',   ico:'🔔', ac:'blue',  ds:'Active · CRM 300 · 푸시허용',           f:{lifecycle:['active'],crm:['300'],push:['허용']}},
    {nm:'재인게이지',  ico:'🔄', ac:'blue',  ds:'Inactive · CRM 300↑ · 푸시허용',       f:{lifecycle:['inactive'],crm:['300','400','500'],push:['허용']}},
    {nm:'신규 유저',   ico:'🌱', ac:'green', ds:'NRU · 푸시허용',                         f:{lifecycle:['nru'],push:['허용']}},
    {nm:'아파트 매매', ico:'🏠', ac:'blue',  ds:'Active · 아파트 · 매매 · 푸시허용',     f:{lifecycle:['active'],property:['아파트'],transaction:['매매'],push:['허용']}},
    {nm:'즉시 이사',   ico:'⚡', ac:'amber', ds:'Active · 긴박도:즉시 · 푸시허용',       f:{lifecycle:['active'],urgency:['즉시'],push:['허용']}},
    {nm:'원오빌 전세', ico:'🏢', ac:'blue',  ds:'Active · 원오빌 · 전세 · 푸시허용',     f:{lifecycle:['active'],property:['원오빌'],transaction:['전세'],push:['허용']}},
    {nm:'서울 30·40대',ico:'📍', ac:'blue',  ds:'Active · 서울 · 30·40대 · 푸시허용',   f:{lifecycle:['active'],region:['서울특별시'],age:['30대','40대'],push:['허용']}},
  ],
  hg:[
    {nm:'마케팅 동의', ico:'✅', ac:'green', ds:'마케팅동의 · 모바일인증',              f:{ad:['1'],mobile:['1']}},
    {nm:'카카오 회원', ico:'💬', ac:'amber', ds:'카카오로그인 · 마케팅동의',            f:{login:['kakao'],ad:['1']}},
    {nm:'중개업소',    ico:'🏢', ac:'blue',  ds:'중개업소 회원',                        f:{subtype:['1']}},
    {nm:'최근 활성',   ico:'📈', ac:'green', ds:'7일 이내 접속 · 마케팅동의',          f:{recency:['7일 이내'],ad:['1']}},
  ]
};

let curSvc='zb', csvOn=false;
const sel={zb:{},hg:{}}, tagMap={zb:{},hg:{}};

/* ── Cube API 설정 ──
   Claude.ai 조직 설정(Settings > Integrations)의
   zigbang-gateway MCP URL을 아래에 입력하세요.
   비워두면 sendPrompt(채팅 전달) 방식으로 대체됩니다. */
const ZIGBANG_MCP_URL = '';

/* ── 필터 키 → Cube dimension 매핑 ── */
const CUBE_DIM = {
  zb: {
    region:      'zb_user_profile_all.current_local1',
    gender:      'zb_user_profile_all.gender',
    age:         'zb_user_profile_all.age_group',
    lifecycle:   'zb_user_profile_all.lifecycle_stage',
    crm:         'zb_user_profile_all.apart_crm_grade',
    property:    'zb_user_profile_all.pref_property_type',
    transaction: 'zb_user_profile_all.pref_transaction_type',
    urgency:     'zb_user_profile_all.urgency_level',
    push:        'zb_user_profile_all.is_push_enabled',
  },
  hg: {
    sex:     'hogangnono_user.sex',
    ad:      'hogangnono_user.ad',
    login:   'hogangnono_user.login_type',
    subtype: 'hogangnono_user.subtype',
    mobile:  'hogangnono_user.mobile_verified',
    recency: 'hogangnono_user.recency',
  }
};

function buildCubeQuery(svc, selectedFilters) {
  const cube = DEFS[svc].cube;
  const dimMap = CUBE_DIM[svc] || {};
  const filters = [];
  Object.entries(selectedFilters).forEach(([key, values]) => {
    if (!dimMap[key] || !values.length) return;
    const vals = key === 'crm' ? values.map(Number) : values;
    filters.push({ member: dimMap[key], operator: 'equals', values: vals });
  });
  return { measures: [`${cube}.user_count`], filters };
}
['zb','hg'].forEach(s=>Object.keys(DEFS[s].groups).forEach(k=>{sel[s][k]=new Set();tagMap[s][k]={};}));

function mk(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}

function build(){
  const root=document.getElementById('root');

  const tabs=mk('div','svc-tabs');
  [{s:'zb',ico:'🏠',nm:'직방'},{s:'hg',ico:'🔍',nm:'호갱노노'}].forEach(({s,ico,nm})=>{
    const b=mk('button','svc-tab'+(s==='zb'?' tab-zb-on':''));
    b.id='tab-'+s;
    b.textContent=ico+' '+nm;
    b.addEventListener('click',()=>switchSvc(s));
    tabs.appendChild(b);
  });
  root.appendChild(tabs);

  const nlWrap=mk('div','nl-wrap');
  const nlIn=mk('textarea','nl-input');
  nlIn.id='nl-in'; nlIn.placeholder='예) 서울 30-40대 아파트 active 유저 CSV 추출해줘';
  nlIn.rows=1;
  nlIn.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();triggerNL();}});
  const nlBt=mk('button','nl-btn'); nlBt.id='nl-btn';
  nlBt.textContent='▶ 분석';
  nlBt.addEventListener('click',triggerNL);
  nlWrap.appendChild(nlIn); nlWrap.appendChild(nlBt);
  root.appendChild(nlWrap);

  const nlSt=mk('div','nl-status'); nlSt.id='nl-st';
  root.appendChild(nlSt);

  ['zb','hg'].forEach(s=>{
    const panel=mk('div'); panel.id='panel-'+s; panel.style.display=s==='zb'?'':'none';

    const secLbl=mk('div','sec-lbl'); secLbl.textContent='추천 세그먼트';
    panel.appendChild(secLbl);
    const segsRow=mk('div','segs-row'); segsRow.id='segs-'+s;
    SEGS[s].forEach(seg=>{
      const card=mk('button','seg a-'+seg.ac);
      const ico=mk('div','seg-ico'); ico.textContent=seg.ico; card.appendChild(ico);
      const txt=mk('div');
      const nm=mk('div','seg-nm'); nm.textContent=seg.nm; txt.appendChild(nm);
      const ds=mk('div','seg-ds'); ds.textContent=seg.ds; txt.appendChild(ds);
      card.appendChild(txt);
      card.addEventListener('click',(function(sg){return function(){applyFilters(s,sg.f);runQuery();};})(seg));
      segsRow.appendChild(card);
    });
    panel.appendChild(segsRow);

    const div=mk('div','divider');
    div.innerHTML='<div class="dline"></div><span class="dtxt">또는 직접 선택</span><div class="dline"></div>';
    panel.appendChild(div);

    const grid=mk('div','grid');
    const layouts={
      zb:[['region','gender+age'],['lifecycle','crm'],['property+transaction','urgency+push']],
      hg:[['sex','ad'],['login','subtype'],['mobile','recency']]
    };
    layouts[s].forEach(row=>{
      row.forEach(slot=>{
        const card=mk('div','card');
        slot.split('+').forEach(k=>{
          const cfg=DEFS[s].groups[k]; if(!cfg) return;
          const lbl=mk('span','clabel'); lbl.textContent=cfg.label; card.appendChild(lbl);
          const tagsEl=mk('div','tags');
          cfg.opts.map(o=>typeof o==='string'?{l:o,v:o}:o).forEach(({l,v})=>{
            const span=mk('span','tag'); span.textContent=l;
            tagMap[s][k][v]=span;
            span.addEventListener('click',(function(sv,ky,va,co,el){return function(){
              const on=sel[sv][ky].has(va);
              if(on){sel[sv][ky].delete(va);el.classList.remove('on-'+co);}
              else  {sel[sv][ky].add(va);   el.classList.add('on-'+co);}
              updateSummary();
            };})(s,k,v,cfg.color,span));
            tagsEl.appendChild(span);
          });
          card.appendChild(tagsEl);
        });
        grid.appendChild(card);
      });
    });
    panel.appendChild(grid);
    root.appendChild(panel);
  });

  const chips=mk('div','chips-bar'); chips.id='chips';
  chips.innerHTML='<span class="empty-msg">필터를 선택하면 여기에 표시됩니다</span>';
  root.appendChild(chips);

  const bot=mk('div','bot');
  const cntLbl=mk('span','cnt-lbl'); cntLbl.id='cnt-lbl'; cntLbl.textContent='0개 조건';
  const csvTog=mk('div','csv-tog'); csvTog.id='csv-tog';
  csvTog.innerHTML='<div class="cb" id="cb">✓</div><span class="cb-l">user_no CSV</span>';
  csvTog.addEventListener('click',()=>{csvOn=!csvOn;csvTog.classList.toggle('on',csvOn);});
  const btnRst=mk('button','btn-rst'); btnRst.textContent='초기화';
  btnRst.addEventListener('click',resetAll);
  const btnQ=mk('button','btn-q zb'); btnQ.id='btn-q';
  btnQ.textContent='🔍 대상 유저 조회';
  btnQ.addEventListener('click',runQuery);
  [cntLbl,csvTog,btnRst,btnQ].forEach(el=>bot.appendChild(el));
  root.appendChild(bot);

  const sent=mk('div'); sent.id='sent'; root.appendChild(sent);
  const resPanel=mk('div','result-panel'); resPanel.id='result-panel'; root.appendChild(resPanel);
}

function switchSvc(s){
  curSvc=s;
  ['zb','hg'].forEach(sv=>{
    document.getElementById('tab-'+sv).className='svc-tab'+(sv===s?' tab-'+sv+'-on':'');
    document.getElementById('panel-'+sv).style.display=sv===s?'':'none';
  });
  document.getElementById('btn-q').className='btn-q '+s;
  document.getElementById('sent').innerHTML='';
  updateSummary();
}

function applyFilters(s,filters){
  Object.keys(sel[s]).forEach(k=>{
    sel[s][k].forEach(v=>{const el=tagMap[s][k][v];if(el)el.classList.remove('on-blue','on-green','on-amber');});
    sel[s][k].clear();
  });
  Object.entries(filters).forEach(([k,vals])=>{
    if(!sel[s][k]) return;
    const cfg=DEFS[s].groups[k]; if(!cfg) return;
    vals.forEach(v=>{
      sel[s][k].add(v);
      const el=tagMap[s][k][v]; if(el) el.classList.add('on-'+cfg.color);
    });
  });
  updateSummary();
}

async function triggerNL(){
  const text=document.getElementById('nl-in').value.trim();
  if(!text) return;
  const btn=document.getElementById('nl-btn');
  const st=document.getElementById('nl-st');
  btn.disabled=true; st.className='nl-status'; st.textContent='분석 중...';
  try{
    const def=DEFS[curSvc];
    const filterDesc=Object.entries(def.groups)
      .map(([k,g])=>k+': '+g.opts.map(o=>typeof o==='string'?o:o.v).join(', ')).join('\n');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:400,
        system:'한국어 자연어를 push 콘솔 필터 JSON으로 변환하는 파서.\n\n사용 가능 필터:\n'+filterDesc+'\ncsv: true/false (CSV 다운로드 여부)\n\nJSON 객체만 반환. 설명 없이.',
        messages:[{role:'user',content:text}]
      })
    });
    const data=await res.json();
    const raw=data.content?.find(c=>c.type==='text')?.text||'{}';
    const parsed=JSON.parse(raw.replace(/```(?:json)?|```/g,'').trim());
    if(parsed.csv){csvOn=true;document.getElementById('csv-tog').classList.add('on');}
    const {csv:_,...filterOnly}=parsed;
    // 값이 문자열/숫자로 올 경우 배열로 정규화
    Object.keys(filterOnly).forEach(k=>{
      if(!Array.isArray(filterOnly[k])) filterOnly[k]=[String(filterOnly[k])];
      else filterOnly[k]=filterOnly[k].map(String);
    });
    applyFilters(curSvc,filterOnly);
    st.textContent='';
    runQuery();
  }catch(e){
    st.className='nl-status err'; st.textContent='분석 실패 — '+e.message;
  }finally{btn.disabled=false;}
}

function resetAll(){
  ['zb','hg'].forEach(s=>Object.keys(sel[s]).forEach(k=>{
    sel[s][k].forEach(v=>{const el=tagMap[s][k][v];if(el)el.classList.remove('on-blue','on-green','on-amber');});
    sel[s][k].clear();
  }));
  document.getElementById('sent').innerHTML='';
  document.getElementById('result-panel').innerHTML='';
  updateSummary();
}

function updateSummary(){
  const s=curSvc,def=DEFS[s].groups;
  const chips=[];let total=0;
  Object.entries(def).forEach(([key,cfg])=>{
    sel[s][key].forEach(v=>{
      const opt=cfg.opts.find(o=>(typeof o==='string'?o:o.v)===v);
      const lbl=typeof opt==='string'?opt:(opt?opt.l:v);
      chips.push('<span class="chip">'+cfg.label+': '+lbl+'</span>');total++;
    });
  });
  document.getElementById('cnt-lbl').textContent=total+'개 조건';
  const bar=document.getElementById('chips');
  bar.innerHTML=chips.length?chips.join(''):'<span class="empty-msg">필터를 선택하면 여기에 표시됩니다</span>';
}

async function runQuery(){
  const s=curSvc,def=DEFS[s].groups,filters={};
  Object.entries(def).forEach(([k])=>{ if(sel[s][k].size) filters[k]=[...sel[s][k]]; });
  const parts=Object.entries(filters).map(([k,vals])=>{
    const cfg=def[k];
    const lbls=vals.map(v=>{const o=cfg.opts.find(x=>(typeof x==='string'?x:x.v)===v);return typeof o==='string'?o:(o?o.l:v);});
    return cfg.label+': '+lbls.join(', ');
  });
  const condStr=parts.length?parts.join(' / '):'전체 (필터 없음)';
  const cubeQuery=buildCubeQuery(s,filters);
  const rp=document.getElementById('result-panel');
  document.getElementById('sent').innerHTML='';
  const btn=document.getElementById('btn-q');
  btn.disabled=true;
  /* 쿼리 즉시 표시 + 상단 로딩 */
  rp.innerHTML=buildResultHTML(null,condStr,cubeQuery,csvOn,'loading');
  try{
    if(ZIGBANG_MCP_URL){
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:`당신은 Cube.js 쿼리 실행 에이전트입니다.
주어진 Cube.js JSON 쿼리를 de-cube-mcp의 run_cube_query 도구로 실행하고,
결과에서 user_count 숫자를 추출하여 아래 JSON 형식으로만 반환하세요.
다른 텍스트 없이 JSON만: {"user_count":NUMBER}`,
          messages:[{role:'user',content:JSON.stringify(cubeQuery)}],
          mcp_servers:[{type:'url',url:ZIGBANG_MCP_URL,name:'zigbang-gateway'}]
        })
      });
      const data=await resp.json();
      let userCount=null;
      const toolResults=(data.content||[]).filter(c=>c.type==='mcp_tool_result').map(c=>c.content?.[0]?.text||'');
      for(const t of toolResults){
        try{const p=JSON.parse(t);const key=`${DEFS[s].cube}.user_count`;if(p.data?.[0]?.[key]!==undefined){userCount=Number(p.data[0][key]);break;}}catch(_){}
      }
      if(userCount===null){
        const txt=(data.content||[]).find(c=>c.type==='text')?.text||'{}';
        try{userCount=JSON.parse(txt.replace(/```json?|```/g,'').trim()).user_count;}catch(_){}
      }
      if(userCount===null) throw new Error('응답에서 user_count를 찾을 수 없습니다');
      rp.innerHTML=buildResultHTML(userCount,condStr,cubeQuery,csvOn,'done');
    } else {
      if(typeof sendPrompt==='function'){
        sendPrompt(`__CUBE_QUERY__ ${JSON.stringify({service:s,cube:DEFS[s].cube,cubeQuery,csv:csvOn})}
조건: ${condStr}${csvOn?' [CSV 포함]':''}`);
      }
      rp.innerHTML=buildResultHTML(null,condStr,cubeQuery,csvOn,'fallback');
      setTimeout(()=>{ btn.disabled=false; },2000);
      return;
    }
  }catch(e){
    rp.innerHTML=buildResultHTML(null,condStr,cubeQuery,csvOn,'error',e.message);
  }finally{
    btn.disabled=false;
  }
}

function buildResultHTML(count,condStr,cubeQuery,csv,state,errMsg){
  const qJson=JSON.stringify(cubeQuery,null,2);
  window._zbQueryStr=qJson;
  const qEsc=qJson.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let hero='';
  if(state==='loading'){
    hero=`
      <div class="res-num-wrap">
        <span class="res-big-num anim">—</span>
        <span class="res-big-unit" style="color:var(--b1)">명</span>
      </div>
      <div class="res-big-label" style="color:var(--tt)">조회 중…</div>
      <div class="res-big-cond" style="color:var(--b2)">${condStr}</div>`;
  } else if(state==='done'){
    const fmt=count.toLocaleString('ko-KR');
    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    hero=`
      <div class="res-num-wrap">
        <span class="res-big-num">${fmt}</span>
        <span class="res-big-unit">명</span>
      </div>
      <div class="res-big-label">푸시 발송 가능 대상</div>
      <div class="res-big-cond">${condStr}</div>
      <div class="res-big-footer">
        <span class="res-time-lbl">${now} 기준</span>
        ${csv?'<span class="res-csv-badge">📥 CSV 포함</span>':''}
        <button class="res-copy-num" data-n="${count}"
          onclick="navigator.clipboard.writeText(this.dataset.n).catch(()=>{});
                   const p=this.textContent;this.textContent='✓ 복사됨';
                   setTimeout(()=>this.textContent=p,2000)">📋 수 복사</button>
      </div>`;
  } else if(state==='fallback'){
    hero=`
      <div class="res-num-wrap">
        <span style="font-size:36px;color:var(--b1);letter-spacing:-1px">?,???</span>
        <span class="res-big-unit" style="color:var(--b1)">명</span>
      </div>
      <div class="res-big-label" style="color:var(--ts)">채팅에서 결과 확인</div>
      <div class="res-big-cond">${condStr}</div>`;
  } else if(state==='error'){
    hero=`
      <div style="font-size:26px;margin-bottom:6px">❌</div>
      <div class="res-big-label" style="color:#A32D2D">조회 실패</div>
      <div style="font-size:11px;color:#A32D2D;margin-top:4px">${errMsg||''}</div>`;
  }
  return `
    <div class="res-hero ${state}">${hero}</div>
    <div class="res-query-box">
      <div class="res-query-hd">
        <span>⚡ Cube.js 쿼리</span>
        <button class="copy-btn"
          onclick="navigator.clipboard.writeText(window._zbQueryStr).catch(()=>{});
                   this.textContent='✓ 복사됨';this.classList.add('ok');
                   setTimeout(()=>{this.textContent='📋 복사';this.classList.remove('ok')},2000)">
          📋 복사</button>
      </div>
      <pre class="res-query-code">${qEsc}</pre>
    </div>`;
}

build();
</script>
</body>
</html>
