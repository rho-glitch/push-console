
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:transparent;color:var(--color-text-primary);padding:16px;font-size:14px}
.svc-tabs{display:flex;gap:4px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;margin-bottom:14px}
.svc-tab{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--color-text-secondary);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-zb-on{background:var(--color-background-primary);color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab-hg-on{background:var(--color-background-primary);color:#3B6D11;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.nl-wrap{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.nl-input{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 12px;font-size:13px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;resize:none;line-height:1.5;min-height:38px;max-height:80px}
.nl-input:focus{border-color:#378ADD}
.nl-input::placeholder{color:var(--color-text-tertiary)}
.nl-btn{border:0.5px solid #378ADD;background:#E6F1FB;color:#185FA5;border-radius:var(--border-radius-md);padding:9px 14px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .12s}
.nl-btn:hover{background:#B5D4F4}
.nl-btn:disabled{opacity:.45;cursor:not-allowed}
.nl-status{font-size:12px;color:var(--color-text-tertiary);margin-bottom:10px;min-height:18px}
.nl-status.err{color:#A32D2D;background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:var(--border-radius-md);padding:6px 10px}
.sec-lbl{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.segs-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.seg{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 11px;cursor:pointer;display:flex;align-items:flex-start;gap:7px;text-align:left;font-family:inherit;transition:all .12s}
.seg:hover{border-color:var(--color-border-primary);background:var(--color-background-secondary)}
.seg-ico{font-size:15px;line-height:1;margin-top:1px}
.seg-nm{font-size:12px;font-weight:500;line-height:1.3}
.seg-ds{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;line-height:1.3}
.seg.a-amber .seg-ico{color:#BA7517}.seg.a-amber .seg-nm{color:#633806}
.seg.a-blue  .seg-ico{color:#185FA5}.seg.a-blue  .seg-nm{color:#0C447C}
.seg.a-green .seg-ico{color:#3B6D11}.seg.a-green .seg-nm{color:#27500A}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0 10px}
.dline{flex:1;border-top:0.5px solid var(--color-border-tertiary)}
.dtxt{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:11px 13px}
.clabel{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:block}
.clabel+.clabel{margin-top:9px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:all .1s}
.tag.on-blue  {background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.tag.on-green {background:#EAF3DE;border-color:#3B6D11;color:#27500A}
.tag.on-amber {background:#FAEEDA;border-color:#BA7517;color:#633806}
.chips-bar{min-height:30px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:10px}
.chip{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--color-text-secondary)}
.empty-msg{font-size:11px;color:var(--color-text-tertiary)}
.bot{display:flex;align-items:center;gap:8px}
.cnt-lbl{font-size:11px;color:var(--color-text-tertiary);flex-shrink:0;min-width:48px}
.csv-tog{display:flex;align-items:center;gap:5px;padding:8px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-secondary);flex-shrink:0;user-select:none;transition:all .12s}
.csv-tog.on{background:#EAF3DE;border-color:#3B6D11}
.cb{width:13px;height:13px;border-radius:3px;border:0.5px solid var(--color-border-primary);background:var(--color-background-primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:500;color:transparent;transition:all .12s}
.csv-tog.on .cb{background:#3B6D11;border-color:#3B6D11;color:#fff}
.cb-l{font-size:12px;color:var(--color-text-secondary)}
.csv-tog.on .cb-l{color:#27500A}
.btn-rst{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);border-radius:var(--border-radius-md);padding:8px 13px;font-size:12px;font-family:inherit;cursor:pointer;flex-shrink:0}
.btn-q{flex:1;border:none;color:#fff;border-radius:var(--border-radius-md);padding:9px 16px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-q.zb{background:#185FA5}.btn-q.hg{background:#3B6D11}
.btn-q:disabled{opacity:.45;cursor:not-allowed}
.sent-box{margin-top:10px;background:#EAF3DE;border:0.5px solid #639922;border-radius:var(--border-radius-md);padding:9px 12px}
.sent-t{font-size:12px;font-weight:500;color:#3B6D11;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.sent-s{font-size:11px;color:#639922;font-family:monospace;line-height:1.5}
</style>

<div id="root"></div>

<script>
const DEFS={
  zb:{cube:'zb_user_profile_all',groups:{
    region:     {color:'blue', label:'거주지역',    opts:['서울특별시','경기도','인천광역시','부산광역시','대구광역시','대전광역시','광주광역시','울산광역시','세종특별자치시','강원도','충청북도','충청남도','전라북도','전라남도','경상북도','경상남도','제주특별자치도']},
    gender:     {color:'blue', label:'성별',        opts:['남자','여자']},
    age:        {color:'blue', label:'나이대',      opts:['10대','20대','30대','40대','50대+']},
    lifecycle:  {color:'green',label:'라이프사이클',opts:['active','inactive','frozen','nru']},
    crm:        {color:'amber',label:'CRM 등급',    opts:[{l:'100 방문',v:'100'},{l:'200 매물조회',v:'200'},{l:'300 찜/알림',v:'300'},{l:'400 1회문의',v:'400'},{l:'500 코어',v:'500'}]},
    property:   {color:'blue', label:'매물유형',    opts:['아파트','원오빌','아파트+원오빌']},
    transaction:{color:'blue', label:'거래유형',    opts:['매매','전세','월세']},
    urgency:    {color:'amber',label:'긴박도',      opts:['즉시','1~3개월','탐색 중','관망','장기']},
    push:       {color:'green',label:'푸시수신',    opts:['허용','거부']}
  }},
  hg:{cube:'hogangnono_user',groups:{
    sex:    {color:'blue', label:'성별',      opts:[{l:'남성',v:'male'},{l:'여성',v:'female'}]},
    ad:     {color:'green',label:'마케팅동의',opts:[{l:'동의',v:'1'},{l:'미동의',v:'0'}]},
    login:  {color:'blue', label:'로그인유형',opts:['kakao','apple','mobile','email']},
    subtype:{color:'blue', label:'회원유형',  opts:[{l:'일반',v:'0'},{l:'중개업소',v:'1'}]},
    mobile: {color:'green',label:'모바일인증',opts:[{l:'인증완료',v:'1'},{l:'미인증',v:'0'}]},
    recency:{color:'amber',label:'최근접속',  opts:['7일 이내','30일 이내','90일 이내','180일 이내']}
  }}
};

const SEGS={
  zb:[
    {nm:'전환 임박',   ico:'ti-flame',      ac:'amber', ds:'Active · CRM 400·500 · 푸시허용',       f:{lifecycle:['active'],crm:['400','500'],push:['허용']}},
    {nm:'넛지 최적',   ico:'ti-bell',       ac:'blue',  ds:'Active · CRM 300 · 푸시허용',           f:{lifecycle:['active'],crm:['300'],push:['허용']}},
    {nm:'재인게이지',  ico:'ti-refresh',    ac:'blue',  ds:'Inactive · CRM 300↑ · 푸시허용',       f:{lifecycle:['inactive'],crm:['300','400','500'],push:['허용']}},
    {nm:'신규 유저',   ico:'ti-leaf',       ac:'green', ds:'NRU · 푸시허용',                         f:{lifecycle:['nru'],push:['허용']}},
    {nm:'아파트 매매', ico:'ti-home',       ac:'blue',  ds:'Active · 아파트 · 매매 · 푸시허용',     f:{lifecycle:['active'],property:['아파트'],transaction:['매매'],push:['허용']}},
    {nm:'즉시 이사',   ico:'ti-bolt',       ac:'amber', ds:'Active · 긴박도:즉시 · 푸시허용',       f:{lifecycle:['active'],urgency:['즉시'],push:['허용']}},
    {nm:'원오빌 전세', ico:'ti-building',   ac:'blue',  ds:'Active · 원오빌 · 전세 · 푸시허용',     f:{lifecycle:['active'],property:['원오빌'],transaction:['전세'],push:['허용']}},
    {nm:'서울 30·40대',ico:'ti-map-pin',    ac:'blue',  ds:'Active · 서울 · 30·40대 · 푸시허용',   f:{lifecycle:['active'],region:['서울특별시'],age:['30대','40대'],push:['허용']}},
  ],
  hg:[
    {nm:'마케팅 동의', ico:'ti-check',         ac:'green', ds:'마케팅동의 · 모바일인증',              f:{ad:['1'],mobile:['1']}},
    {nm:'카카오 회원', ico:'ti-message',        ac:'amber', ds:'카카오로그인 · 마케팅동의',            f:{login:['kakao'],ad:['1']}},
    {nm:'중개업소',    ico:'ti-building',       ac:'blue',  ds:'중개업소 회원',                        f:{subtype:['1']}},
    {nm:'최근 활성',   ico:'ti-trending-up',    ac:'green', ds:'7일 이내 접속 · 마케팅동의',          f:{recency:['7일 이내'],ad:['1']}},
  ]
};

let curSvc='zb', csvOn=false;
const sel={zb:{},hg:{}}, tagMap={zb:{},hg:{}};
['zb','hg'].forEach(s=>Object.keys(DEFS[s].groups).forEach(k=>{sel[s][k]=new Set();tagMap[s][k]={};}));

function mk(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}
function icon(cls){const i=mk('i',cls);i.setAttribute('aria-hidden','true');return i;}

function build(){
  const root=document.getElementById('root');

  const tabs=mk('div','svc-tabs');
  [{s:'zb',ic:'ti ti-home',nm:'직방'},{s:'hg',ic:'ti ti-search',nm:'호갱노노'}].forEach(({s,ic,nm})=>{
    const b=mk('button','svc-tab'+(s==='zb'?' tab-zb-on':''));
    b.id='tab-'+s; b.appendChild(icon(ic));
    b.appendChild(document.createTextNode(' '+nm));
    b.addEventListener('click',()=>switchSvc(s));
    tabs.appendChild(b);
  });
  root.appendChild(tabs);

  const nlWrap=mk('div','nl-wrap');
  const nlIn=mk('textarea','nl-input');
  nlIn.id='nl-in'; nlIn.placeholder='예) 서울 30-40대 아파트 active 유저 CSV 추출해줘';
  nlIn.rows=1;
  nlIn.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();triggerNL();}});
  const nlBt=mk('button','nl-btn'); nlBt.id='nl-btn';
  nlBt.appendChild(icon('ti ti-arrow-right'));
  nlBt.appendChild(document.createTextNode(' 분석'));
  nlBt.addEventListener('click',triggerNL);
  nlWrap.appendChild(nlIn); nlWrap.appendChild(nlBt);
  root.appendChild(nlWrap);

  const nlSt=mk('div','nl-status'); nlSt.id='nl-st';
  root.appendChild(nlSt);

  ['zb','hg'].forEach(s=>{
    const panel=mk('div'); panel.id='panel-'+s; panel.style.display=s==='zb'?'':'none';

    const secLbl=mk('div','sec-lbl'); secLbl.textContent='추천 세그먼트';
    panel.appendChild(secLbl);
    const segsRow=mk('div','segs-row'); segsRow.id='segs-'+s;
    SEGS[s].forEach(seg=>{
      const card=mk('button','seg a-'+seg.ac);
      const ico=mk('div','seg-ico'); ico.appendChild(icon('ti '+seg.ico)); card.appendChild(ico);
      const txt=mk('div');
      const nm=mk('div','seg-nm'); nm.textContent=seg.nm; txt.appendChild(nm);
      const ds=mk('div','seg-ds'); ds.textContent=seg.ds; txt.appendChild(ds);
      card.appendChild(txt);
      card.addEventListener('click',(function(sg){return function(){applyFilters(s,sg.f);runQuery();};})(seg));
      segsRow.appendChild(card);
    });
    panel.appendChild(segsRow);

    const div=mk('div','divider');
    div.innerHTML='<div class="dline"></div><span class="dtxt">또는 직접 선택</span><div class="dline"></div>';
    panel.appendChild(div);

    const grid=mk('div','grid');
    const layouts={
      zb:[['region','gender+age'],['lifecycle','crm'],['property+transaction','urgency+push']],
      hg:[['sex','ad'],['login','subtype'],['mobile','recency']]
    };
    layouts[s].forEach(row=>{
      row.forEach(slot=>{
        const card=mk('div','card');
        slot.split('+').forEach(k=>{
          const cfg=DEFS[s].groups[k]; if(!cfg) return;
          const lbl=mk('span','clabel'); lbl.textContent=cfg.label; card.appendChild(lbl);
          const tagsEl=mk('div','tags');
          cfg.opts.map(o=>typeof o==='string'?{l:o,v:o}:o).forEach(({l,v})=>{
            const span=mk('span','tag'); span.textContent=l;
            tagMap[s][k][v]=span;
            span.addEventListener('click',(function(sv,ky,va,co,el){return function(){
              const on=sel[sv][ky].has(va);
              if(on){sel[sv][ky].delete(va);el.classList.remove('on-'+co);}
              else  {sel[sv][ky].add(va);   el.classList.add('on-'+co);}
              updateSummary();
            };})(s,k,v,cfg.color,span));
            tagsEl.appendChild(span);
          });
          card.appendChild(tagsEl);
        });
        grid.appendChild(card);
      });
    });
    panel.appendChild(grid);
    root.appendChild(panel);
  });

  const chips=mk('div','chips-bar'); chips.id='chips';
  chips.innerHTML='<span class="empty-msg">필터를 선택하면 여기에 표시됩니다</span>';
  root.appendChild(chips);

  const bot=mk('div','bot');
  const cntLbl=mk('span','cnt-lbl'); cntLbl.id='cnt-lbl'; cntLbl.textContent='0개 조건';
  const csvTog=mk('div','csv-tog'); csvTog.id='csv-tog';
  csvTog.innerHTML='<div class="cb" id="cb">✓</div><span class="cb-l">user_no CSV</span>';
  csvTog.addEventListener('click',()=>{csvOn=!csvOn;csvTog.classList.toggle('on',csvOn);});
  const btnRst=mk('button','btn-rst'); btnRst.textContent='초기화';
  btnRst.addEventListener('click',resetAll);
  const btnQ=mk('button','btn-q zb'); btnQ.id='btn-q';
  btnQ.appendChild(icon('ti ti-search'));
  btnQ.appendChild(document.createTextNode(' 대상 유저 조회'));
  btnQ.addEventListener('click',runQuery);
  [cntLbl,csvTog,btnRst,btnQ].forEach(el=>bot.appendChild(el));
  root.appendChild(bot);

  const sent=mk('div'); sent.id='sent'; root.appendChild(sent);
}

function switchSvc(s){
  curSvc=s;
  ['zb','hg'].forEach(sv=>{
    document.getElementById('tab-'+sv).className='svc-tab'+(sv===s?' tab-'+sv+'-on':'');
    document.getElementById('panel-'+sv).style.display=sv===s?'':'none';
  });
  document.getElementById('btn-q').className='btn-q '+s;
  document.getElementById('sent').innerHTML='';
  updateSummary();
}

function applyFilters(s,filters){
  Object.keys(sel[s]).forEach(k=>{
    sel[s][k].forEach(v=>{const el=tagMap[s][k][v];if(el)el.classList.remove('on-blue','on-green','on-amber');});
    sel[s][k].clear();
  });
  Object.entries(filters).forEach(([k,vals])=>{
    if(!sel[s][k]) return;
    const cfg=DEFS[s].groups[k]; if(!cfg) return;
    vals.forEach(v=>{
      sel[s][k].add(v);
      const el=tagMap[s][k][v]; if(el) el.classList.add('on-'+cfg.color);
    });
  });
  updateSummary();
}

async function triggerNL(){
  const text=document.getElementById('nl-in').value.trim();
  if(!text) return;
  const btn=document.getElementById('nl-btn');
  const st=document.getElementById('nl-st');
  btn.disabled=true; st.className='nl-status'; st.textContent='분석 중...';
  try{
    const def=DEFS[curSvc];
    const filterDesc=Object.entries(def.groups)
      .map(([k,g])=>k+': '+g.opts.map(o=>typeof o==='string'?o:o.v).join(', ')).join('\n');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:400,
        system:'한국어 자연어를 push 콘솔 필터 JSON으로 변환하는 파서.\n\n사용 가능 필터:\n'+filterDesc+'\ncsv: true/false (CSV 다운로드 여부)\n\nJSON 객체만 반환. 설명 없이.',
        messages:[{role:'user',content:text}]
      })
    });
    const data=await res.json();
    const raw=data.content?.find(c=>c.type==='text')?.text||'{}';
    const parsed=JSON.parse(raw.replace(/```(?:json)?|```/g,'').trim());
    if(parsed.csv){csvOn=true;document.getElementById('csv-tog').classList.add('on');}
    const {csv:_,...filterOnly}=parsed;
    applyFilters(curSvc,filterOnly);
    st.textContent='';
    runQuery();
  }catch(e){
    st.className='nl-status err'; st.textContent='분석 실패 — '+e.message;
  }finally{btn.disabled=false;}
}

function resetAll(){
  ['zb','hg'].forEach(s=>Object.keys(sel[s]).forEach(k=>{
    sel[s][k].forEach(v=>{const el=tagMap[s][k][v];if(el)el.classList.remove('on-blue','on-green','on-amber');});
    sel[s][k].clear();
  }));
  document.getElementById('sent').innerHTML='';
  updateSummary();
}

function updateSummary(){
  const s=curSvc,def=DEFS[s].groups;
  const chips=[];let total=0;
  Object.entries(def).forEach(([key,cfg])=>{
    sel[s][key].forEach(v=>{
      const opt=cfg.opts.find(o=>(typeof o==='string'?o:o.v)===v);
      const lbl=typeof opt==='string'?opt:(opt?opt.l:v);
      chips.push('<span class="chip">'+cfg.label+': '+lbl+'</span>');total++;
    });
  });
  document.getElementById('cnt-lbl').textContent=total+'개 조건';
  const bar=document.getElementById('chips');
  bar.innerHTML=chips.length?chips.join(''):'<span class="empty-msg">필터를 선택하면 여기에 표시됩니다</span>';
}

function runQuery(){
  const s=curSvc,def=DEFS[s].groups,filters={};
  Object.entries(def).forEach(([k])=>{if(sel[s][k].size)filters[k]=[...sel[s][k]];});
  const parts=Object.entries(filters).map(([k,vals])=>{
    const cfg=def[k];
    const lbls=vals.map(v=>{const o=cfg.opts.find(x=>(typeof x==='string'?x:x.v)===v);return typeof o==='string'?o:(o?o.l:v);});
    return cfg.label+': '+lbls.join(', ');
  });
  const condStr=parts.length?parts.join(' / '):'전체 (필터 없음)';
  const payload={service:s,cube:DEFS[s].cube,csv:csvOn,filters};
  document.getElementById('sent').innerHTML=
    '<div class="sent-box"><div class="sent-t"><i class="ti ti-send" style="font-size:13px" aria-hidden="true"></i> 조회 요청 전송됨'+(csvOn?' · CSV 포함':'')+'</div><div class="sent-s">'+condStr+'</div></div>';
  const btn=document.getElementById('btn-q');
  btn.disabled=true; setTimeout(()=>{btn.disabled=false;},3000);
  sendPrompt('__CUBE_QUERY__ '+JSON.stringify(payload)+'\n조건: '+condStr+(csvOn?' [CSV 다운로드 포함]':''));
}

build();
</script>
