<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>직방 푸시 콘솔</title>
<style>
:root{
  --color-text-primary:#111827;
  --color-text-secondary:#374151;
  --color-text-tertiary:#9CA3AF;
  --color-background-primary:#FFFFFF;
  --color-background-secondary:#F3F4F6;
  --color-border-primary:#9CA3AF;
  --color-border-secondary:#D1D5DB;
  --color-border-tertiary:#E5E7EB;
  --border-radius-md:8px;
  --border-radius-lg:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:transparent;color:var(--color-text-primary);padding:16px;font-size:14px}
.svc-tabs{display:flex;gap:4px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;margin-bottom:14px}
.svc-tab{flex:1;padding:7px;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--color-text-secondary);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-zb-on{background:var(--color-background-primary);color:#185FA5;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab-hg-on{background:var(--color-background-primary);color:#3B6D11;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.nl-wrap{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.nl-input{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 12px;font-size:13px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;resize:none;line-height:1.5;min-height:38px;max-height:80px}
.nl-input:focus{border-color:#378ADD}
.nl-input::placeholder{color:var(--color-text-tertiary)}
.nl-btn{border:0.5px solid #378ADD;background:#E6F1FB;color:#185FA5;border-radius:var(--border-radius-md);padding:9px 14px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .12s}
.nl-btn:hover{background:#B5D4F4}
.nl-btn:disabled{opacity:.45;cursor:not-allowed}
.nl-status{font-size:12px;color:var(--color-text-tertiary);margin-bottom:10px;min-height:18px;display:flex;align-items:center;gap:6px}
.nl-status.err{color:#A32D2D;background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:var(--border-radius-md);padding:6px 10px}
.spin{width:12px;height:12px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}
.sec-lbl{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.segs-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.seg{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 11px;cursor:pointer;display:flex;align-items:flex-start;gap:7px;text-align:left;font-family:inherit;transition:all .12s}
.seg:hover{border-color:var(--color-border-primary);background:var(--color-background-secondary)}
.seg-ico{display:flex;align-items:center;margin-top:1px;flex-shrink:0}
.seg-nm{font-size:12px;font-weight:500;line-height:1.3}
.seg-ds{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;line-height:1.3}
.seg.a-amber .seg-ico{color:#BA7517}.seg.a-amber .seg-nm{color:#633806}
.seg.a-blue  .seg-ico{color:#185FA5}.seg.a-blue  .seg-nm{color:#0C447C}
.seg.a-green .seg-ico{color:#3B6D11}.seg.a-green .seg-nm{color:#27500A}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0 10px}
.dline{flex:1;border-top:0.5px solid var(--color-border-tertiary)}
.dtxt{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.card{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:11px 13px}
.clabel{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:block}
.clabel+.clabel{margin-top:9px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:all .1s}
.tag.on-blue  {background:#E6F1FB;border-color:#378ADD;color:#0C447C}
.tag.on-green {background:#EAF3DE;border-color:#3B6D11;color:#27500A}
.tag.on-amber {background:#FAEEDA;border-color:#BA7517;color:#633806}
.chips-bar{min-height:30px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:10px}
.chip{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--color-text-secondary)}
.empty-msg{font-size:11px;color:var(--color-text-tertiary)}
.bot{display:flex;align-items:center;gap:8px}
.cnt-lbl{font-size:11px;color:var(--color-text-tertiary);flex-shrink:0;min-width:48px}
/* ── mode selector ─────────────────────────────── */
.mode-seg{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;flex-shrink:0}
.mode-opt{padding:7px 10px;border:none;border-right:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);font-size:12px;font-family:inherit;cursor:pointer;color:var(--color-text-secondary);transition:all .12s;white-space:nowrap;line-height:1}
.mode-opt:last-child{border-right:none}
.mode-opt.on-csv  {background:#EAF3DE;color:#27500A}
.mode-opt.on-admin{background:#E6F1FB;color:#0C447C}
.mode-opt.on-both {background:#FAEEDA;color:#633806}
/* ── api settings panel ────────────────────────── */
.api-cfg{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:8px;display:none}
.api-cfg.show{display:block}
.api-hd{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:5px}
.api-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.api-row:last-child{margin-bottom:0}
.api-lbl{font-size:11px;color:var(--color-text-secondary);flex-shrink:0;width:68px}
.api-inp{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.api-inp:focus{border-color:#378ADD}
.api-inp::placeholder{color:var(--color-text-tertiary)}
.api-save{border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);border-radius:6px;padding:6px 11px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--color-text-secondary);flex-shrink:0;transition:all .12s}
.api-save:hover{border-color:var(--color-border-primary);background:var(--color-background-secondary)}
.api-saved-msg{color:#3B6D11;font-size:11px;display:none;flex-shrink:0}
/* ── bottom ────────────────────────────────────── */
.btn-rst{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);border-radius:var(--border-radius-md);padding:8px 13px;font-size:12px;font-family:inherit;cursor:pointer;flex-shrink:0;transition:all .12s}
.btn-rst:hover{background:var(--color-background-primary)}
.btn-q{flex:1;border:none;color:#fff;border-radius:var(--border-radius-md);padding:9px 16px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .12s}
.btn-q.zb{background:#185FA5}.btn-q.hg{background:#3B6D11}
.btn-q:disabled{opacity:.45;cursor:not-allowed}
.btn-q .spin{border-color:#fff;border-top-color:transparent}
.sent-box{margin-top:10px;background:#EAF3DE;border:0.5px solid #639922;border-radius:var(--border-radius-md);padding:9px 12px}
.sent-box.loading{background:#EBF3FC;border-color:#378ADD}
.sent-t{font-size:12px;font-weight:500;color:#3B6D11;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.sent-box.loading .sent-t{color:#185FA5}
.sent-s{font-size:11px;color:#639922;font-family:monospace;line-height:1.5}
.sent-box.loading .sent-s{color:#378ADD}
</style>
</head>
<body>
<div id="root"></div>
<script>
/* ── 인라인 SVG 아이콘 ───────────────────────────────────── */

function icon(name,size=16){
  const span=document.createElement('span');
  span.setAttribute('aria-hidden','true');
  span.style.cssText='display:inline-flex;align-items:center;flex-shrink:0';
  span.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
  return span;
}
function svgStr(name,size=13){
  return `<span aria-hidden="true" style="display:inline-flex;align-items:center"><svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg></span>`;
}

/* ── 데이터 정의 ─────────────────────────────────────────── */
const DEFS={

    property:   {color:'blue', label:'매물유형',    opts:['아파트','원오빌','아파트+원오빌']},

  }},

/* ── 상태 ────────────────────────────────────────────────── */
let curSvc='zb', outputMode='csv';
let apiCfg={endpoint:'',key:''};
try{const s=localStorage.getItem('zb_push_api');if(s)apiCfg=JSON.parse(s);}catch(e){}

const sel={zb:{},hg:{}}, tagMap={zb:{},hg:{}};
['zb','hg'].forEach(s=>Object.keys(DEFS[s].groups).forEach(k=>{sel[s][k]=new Set();tagMap[s][k]={};}));

function mk(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}

/* ── 모드 셀렉터 ─────────────────────────────────────────── */
const MODE_OPTS=[
  {v:'csv',  l:'CSV 다운로드', cls:'on-csv'},
  {v:'admin',l:'어드민 등록',  cls:'on-admin'},
  {v:'both', l:'둘 다',        cls:'on-both'},
];
function buildModeSeg(){
  const seg=mk('div','mode-seg'); seg.id='mode-seg';
  MODE_OPTS.forEach(({v,l,cls})=>{
    const btn=mk('button','mode-opt'+(outputMode===v?' '+cls:''));
    btn.textContent=l; btn.dataset.mode=v;
    btn.addEventListener('click',()=>{
      outputMode=v;
      refreshModeUI();
      updateApiPanel();
    });
    seg.appendChild(btn);
  });
  return seg;
}
function refreshModeUI(){
  document.querySelectorAll('.mode-opt').forEach(b=>{
    const mo=MODE_OPTS.find(o=>o.v===b.dataset.mode);
    if(!mo) return;
    b.className='mode-opt'+(outputMode===mo.v?' '+mo.cls:'');
  });
}
function updateApiPanel(){
  const p=document.getElementById('api-cfg-panel');
  if(p) p.classList.toggle('show', outputMode==='admin'||outputMode==='both');
}

/* ── API 설정 패널 ───────────────────────────────────────── */
function buildApiCfg(){
  const panel=mk('div','api-cfg'); panel.id='api-cfg-panel';
  if(outputMode==='admin'||outputMode==='both') panel.classList.add('show');

  const hd=mk('div','api-hd');
  hd.appendChild(icon('settings',11));
  hd.appendChild(document.createTextNode(' 어드민 API 설정'));
  panel.appendChild(hd);

  // 엔드포인트 행
  const r1=mk('div','api-row');
  const l1=mk('span','api-lbl'); l1.textContent='엔드포인트';
  const i1=mk('input','api-inp'); i1.id='api-ep'; i1.type='text';
  i1.placeholder='https://admin.zigbang.com/api/push/targets';
  i1.value=apiCfg.endpoint;
  r1.appendChild(l1); r1.appendChild(i1);
  panel.appendChild(r1);

  // API Key 행
  const r2=mk('div','api-row');
  const l2=mk('span','api-lbl'); l2.textContent='API Key';
  const i2=mk('input','api-inp'); i2.id='api-key'; i2.type='password';
  i2.placeholder='발급받은 API Key 입력';
  i2.value=apiCfg.key;
  const saveBtn=mk('button','api-save'); saveBtn.textContent='저장';
  const savedMsg=mk('span','api-saved-msg'); savedMsg.id='api-saved-msg'; savedMsg.textContent='✓ 저장됨';
  saveBtn.addEventListener('click',()=>{
    const ep=(document.getElementById('api-ep')||{}).value.trim();
    const k=(document.getElementById('api-key')||{}).value.trim();
    apiCfg={endpoint:ep,key:k};
    try{localStorage.setItem('zb_push_api',JSON.stringify(apiCfg));}catch(e){}
    savedMsg.style.display='inline';
    setTimeout(()=>{savedMsg.style.display='none';},2000);
  });
  r2.appendChild(l2); r2.appendChild(i2); r2.appendChild(saveBtn); r2.appendChild(savedMsg);
  panel.appendChild(r2);

  return panel;
}

/* ── DOM 빌드 ────────────────────────────────────────────── */
function build(){
  const root=document.getElementById('root');

  /* 서비스 탭 */
  const tabs=mk('div','svc-tabs');
  [{s:'zb',ico:'home',nm:'직방'},{s:'hg',ico:'search',nm:'호갱노노'}].forEach(({s,ico,nm})=>{
    const b=mk('button','svc-tab'+(s==='zb'?' tab-zb-on':''));
    b.id='tab-'+s;
    b.appendChild(icon(ico,14));
    b.appendChild(document.createTextNode(' '+nm));
    b.addEventListener('click',()=>switchSvc(s));
    tabs.appendChild(b);
  });
  root.appendChild(tabs);

  /* 자연어 입력 */
  const nlWrap=mk('div','nl-wrap');
  const nlIn=mk('textarea','nl-input'); nlIn.id='nl-in';
  nlIn.placeholder='예) 서울 30-40대 아파트 active 유저 어드민에 등록해줘';
  nlIn.rows=1;
  nlIn.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();triggerNL();}});
  const nlBt=mk('button','nl-btn'); nlBt.id='nl-btn';
  nlBt.appendChild(icon('arrow-right',14));
  nlBt.appendChild(document.createTextNode(' 분석'));
  nlBt.addEventListener('click',triggerNL);
  nlWrap.appendChild(nlIn); nlWrap.appendChild(nlBt);
  root.appendChild(nlWrap);

  const nlSt=mk('div','nl-status'); nlSt.id='nl-st';
  root.appendChild(nlSt);

  /* 서비스별 패널 */
  ['zb','hg'].forEach(s=>{
    const panel=mk('div'); panel.id='panel-'+s; panel.style.display=s==='zb'?'':'none';

    const secLbl=mk('div','sec-lbl'); secLbl.textContent='추천 세그먼트'; panel.appendChild(secLbl);
    const segsRow=mk('div','segs-row');
    SEGS[s].forEach(seg=>{
      const card=mk('button','seg a-'+seg.ac);
      const ico=mk('div','seg-ico'); ico.appendChild(icon(seg.ico,15)); card.appendChild(ico);
      const txt=mk('div');
      const nm=mk('div','seg-nm'); nm.textContent=seg.nm; txt.appendChild(nm);
      const ds=mk('div','seg-ds'); ds.textContent=seg.ds; txt.appendChild(ds);
      card.appendChild(txt);
      card.addEventListener('click',(function(sg){return function(){applyFilters(s,sg.f);runQuery();};})(seg));
      segsRow.appendChild(card);
    });
    panel.appendChild(segsRow);

    const div=mk('div','divider');
    div.innerHTML='<div class="dline"></div><span class="dtxt">또는 직접 선택</span><div class="dline"></div>';
    panel.appendChild(div);

    const grid=mk('div','grid');
    const layouts={
      zb:[['region','gender+age'],['lifecycle','crm'],['property+transaction','urgency+push']],
      hg:[['sex','ad'],['login','subtype'],['mobile','recency']]
    };
    layouts[s].forEach(row=>{
      row.forEach(slot=>{
        const card=mk('div','card');
        slot.split('+').forEach(k=>{
          const cfg=DEFS[s].groups[k]; if(!cfg) return;
          const lbl=mk('span','clabel'); lbl.textContent=cfg.label; card.appendChild(lbl);
          const tagsEl=mk('div','tags');
          cfg.opts.map(o=>typeof o==='string'?{l:o,v:o}:o).forEach(({l,v})=>{
            const span=mk('span','tag'); span.textContent=l;
            tagMap[s][k][v]=span;
            span.addEventListener('click',(function(sv,ky,va,co,el){return function(){
              const on=sel[sv][ky].has(va);
              if(on){sel[sv][ky].delete(va);el.classList.remove('on-'+co);}
              else  {sel[sv][ky].add(va);   el.classList.add('on-'+co);}
              updateSummary();
            };})(s,k,v,cfg.color,span));
            tagsEl.appendChild(span);
          });
          card.appendChild(tagsEl);
        });
        grid.appendChild(card);
      });
    });
    panel.appendChild(grid);
    root.appendChild(panel);
  });

  /* 선택 조건 칩 바 */
  const chips=mk('div','chips-bar'); chips.id='chips';
  chips.innerHTML='<span class="empty-msg">필터를 선택하면 여기에 표시됩니다</span>';
  root.appendChild(chips);

  /* 하단 버튼 바 */
  const bot=mk('div','bot');
  const cntLbl=mk('span','cnt-lbl'); cntLbl.id='cnt-lbl'; cntLbl.textContent='0개 조건';
  const modeSeg=buildModeSeg();
  const btnRst=mk('button','btn-rst'); btnRst.textContent='초기화';
  btnRst.addEventListener('click',resetAll);
  const btnQ=mk('button','btn-q zb'); btnQ.id='btn-q';
  btnQ.appendChild(icon('search',14));
  btnQ.appendChild(document.createTextNode(' 대상 유저 조회'));
  btnQ.addEventListener('click',runQuery);
  [cntLbl,modeSeg,btnRst,btnQ].forEach(el=>bot.appendChild(el));
  root.appendChild(bot);

  /* API 설정 패널 (모드에 따라 show/hide) */
  root.appendChild(buildApiCfg());

  const sent=mk('div'); sent.id='sent'; root.appendChild(sent);
}

/* ── 탭 전환 ─────────────────────────────────────────────── */
function switchSvc(s){
  curSvc=s;
  ['zb','hg'].forEach(sv=>{
    document.getElementById('tab-'+sv).className='svc-tab'+(sv===s?' tab-'+sv+'-on':'');
    document.getElementById('panel-'+sv).style.display=sv===s?'':'none';
  });
  document.getElementById('btn-q').className='btn-q '+s;
  document.getElementById('sent').innerHTML='';
  updateSummary();
}

/* ── 필터 일괄 적용 ──────────────────────────────────────── */
function applyFilters(s,filters){
  Object.keys(sel[s]).forEach(k=>{
    sel[s][k].forEach(v=>{const el=tagMap[s][k][v];if(el)el.classList.remove('on-blue','on-green','on-amber');});
    sel[s][k].clear();
  });
  Object.entries(filters).forEach(([k,vals])=>{
    if(!sel[s][k]) return;
    const cfg=DEFS[s].groups[k]; if(!cfg) return;
    vals.forEach(v=>{
      sel[s][k].add(v);
      const el=tagMap[s][k][v]; if(el) el.classList.add('on-'+cfg.color);
    });
  });
  updateSummary();
}

/* ── 자연어 분석 ─────────────────────────────────────────── */
async function triggerNL(){
  const text=document.getElementById('nl-in').value.trim();
  if(!text) return;
  const btn=document.getElementById('nl-btn');
  const st=document.getElementById('nl-st');
  btn.disabled=true;
  st.className='nl-status';
  st.innerHTML=''; st.appendChild((()=>{const d=mk('div','spin');return d;})());
  st.appendChild(document.createTextNode(' 분석 중...'));
  try{
    const def=DEFS[curSvc];
    const filterDesc=Object.entries(def.groups)
      .map(([k,g])=>k+': '+g.opts.map(o=>typeof o==='string'?o:o.v).join(', ')).join('\n');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:400,
        system:'한국어 자연어를 push 콘솔 필터 JSON으로 변환하는 파서.\n\n사용 가능 필터:\n'+filterDesc+'\nmode: "csv" | "admin" | "both" (출력 방식; "어드민 등록"→admin, "CSV"→csv, 둘다→both, 언급 없으면 생략)\n\nJSON 객체만 반환. 설명 없이.',
        messages:[{role:'user',content:text}]
      })
    });
    const data=await res.json();
    const raw=data.content?.find(c=>c.type==='text')?.text||'{}';
    const parsed=JSON.parse(raw.replace(/```(?:json)?|```/g,'').trim());
    if(parsed.mode&&['csv','admin','both'].includes(parsed.mode)){
      outputMode=parsed.mode;
      refreshModeUI();
      updateApiPanel();
    }
    const {mode:_,...filterOnly}=parsed;
    applyFilters(curSvc,filterOnly);
    st.innerHTML='';
    runQuery();
  }catch(e){
    st.className='nl-status err';
    st.innerHTML=svgStr('alert-circle',13)+' 분석 실패 — '+e.message;
  }finally{btn.disabled=false;}
}

/* ── 전체 초기화 ─────────────────────────────────────────── */
function resetAll(){
  ['zb','hg'].forEach(s=>Object.keys(sel[s]).forEach(k=>{
    sel[s][k].forEach(v=>{const el=tagMap[s][k][v];if(el)el.classList.remove('on-blue','on-green','on-amber');});
    sel[s][k].clear();
  }));
  document.getElementById('sent').innerHTML='';
  document.getElementById('nl-in').value='';
  document.getElementById('nl-st').innerHTML='';
  updateSummary();
}

/* ── 조건 칩 업데이트 ────────────────────────────────────── */
function updateSummary(){
  const s=curSvc,def=DEFS[s].groups;
  const chips=[];let total=0;
  Object.entries(def).forEach(([key,cfg])=>{
    sel[s][key].forEach(v=>{
      const opt=cfg.opts.find(o=>(typeof o==='string'?o:o.v)===v);
      const lbl=typeof opt==='string'?opt:(opt?opt.l:v);
      chips.push('<span class="chip">'+cfg.label+': '+lbl+'</span>');total++;
    });
  });
  document.getElementById('cnt-lbl').textContent=total+'개 조건';
  const bar=document.getElementById('chips');
  bar.innerHTML=chips.length?chips.join(''):'<span class="empty-msg">필터를 선택하면 여기에 표시됩니다</span>';
}

/* ── 쿼리 실행 ───────────────────────────────────────────── */
function runQuery(){
  const s=curSvc,def=DEFS[s].groups,filters={};
  Object.entries(def).forEach(([k])=>{if(sel[s][k].size)filters[k]=[...sel[s][k]];});
  const parts=Object.entries(filters).map(([k,vals])=>{
    const cfg=def[k];
    const lbls=vals.map(v=>{const o=cfg.opts.find(x=>(typeof x==='string'?x:x.v)===v);return typeof o==='string'?o:(o?o.l:v);});
    return cfg.label+': '+lbls.join(', ');
  });
  const condStr=parts.length?parts.join(' / '):'전체 (필터 없음)';

  const modeLabel ={csv:'CSV 다운로드',        admin:'어드민 등록',         both:'CSV + 어드민 등록'}[outputMode];
  const loadLabel  ={csv:'CSV 파일 생성 중...', admin:'어드민 등록 중...',   both:'CSV 생성 + 어드민 등록 중...'}[outputMode];
  const modeTag    ={csv:'[CSV 다운로드]',      admin:'[어드민 등록]',       both:'[CSV + 어드민 등록]'}[outputMode];

  // 어드민 모드일 때 API 설정 포함 (Key는 SET/UNSET 표시, 실제값은 Claude에게만 전달)
  const useAdmin=outputMode==='admin'||outputMode==='both';
  const adminPayload=useAdmin?{
    endpoint:apiCfg.endpoint||'(미설정)',
    key:apiCfg.key||'(미설정)',
  }:undefined;

  const payload={
    service:s,
    cube:DEFS[s].cube,
    mode:outputMode,
    filters,
    ...(adminPayload?{admin_api:adminPayload}:{})
  };

  /* 로딩 상태 */
  const sentEl=document.getElementById('sent');
  sentEl.innerHTML=
    '<div class="sent-box loading">'+
      '<div class="sent-t"><div class="spin" style="border-color:#185FA5;border-top-color:transparent;opacity:1"></div> '+loadLabel+'</div>'+
      '<div class="sent-s">'+condStr+'</div>'+
    '</div>';

  const btn=document.getElementById('btn-q');
  const origHTML=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div> '+loadLabel;
  setTimeout(()=>{
    btn.disabled=false;
    btn.innerHTML=origHTML;
    sentEl.innerHTML=
      '<div class="sent-box">'+
        '<div class="sent-t">'+svgStr('send',13)+' 조회 요청 전송됨 · '+modeLabel+'</div>'+
        '<div class="sent-s">'+condStr+'</div>'+
      '</div>';
  },3000);

  const msg='__CUBE_QUERY__ '+JSON.stringify(payload)+'\n조건: '+condStr+' '+modeTag;
  if(typeof sendPrompt==='function') sendPrompt(msg);
  else console.log('[PUSH CONSOLE]',msg);
}

build();
</script>
</body>
</html>
